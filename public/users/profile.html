<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>
    <link rel="stylesheet" href="/users/style.css" />
  </head>
  <body data-ssr-profile="{{ssr:profile_json}}" data-ssr-credentials="{{ssr:credentials_json}}">
    <power-strip providers="{{ssr:providers}}" style="position: absolute; top: 0; right: 0; z-index: 9999; border-radius: 0 0 0 0.3rem">
      <svg viewBox="0 0 24 24" style="width: 1rem; height: 1rem"><path d="M7 2v11h3v9l7-12h-4l4-8z" fill="#ffcc00" /></svg>
    </power-strip>
    <script src="/users/power-strip.js" async></script>

    <div class="header-area">
      <a href="/" class="back-link">← Back to Home</a>
      <h1 class="page-subtitle">User Profile</h1>
      <div id="page-title" class="page-title">{{ssr:profile_name}}</div>
      <div id="user-id-subtitle" class="subtitle">
        <span class="id-text" id="user-id-text">ID: {{ssr:profile_id}}</span>
        <button id="copy-id-btn" class="copy-btn" title="Copy User ID">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="main-layout">
      <nav class="sidebar">
        <ul class="nav-list">
          <li class="nav-item">
            <a href="/users/profile.html" class="nav-link active">Profile</a>
          </li>
          <li class="nav-item" id="nav-account-item" style="{{ssr:nav_account_display}}">
            <a href="/users/accounts.html" class="nav-link">Account Settings</a>
          </li>
        </ul>
      </nav>

      <div class="content-area">
        <section>
          <div class="avatar-section">
            <div style="position: relative">
              <img
                id="profile-picture"
                class="avatar-large"
                src="{{ssr:profile_picture}}"
                alt="Profile Picture"
                style="{{ssr:profile_picture_display}}"
              />
              <div
                id="profile-avatar-placeholder"
                class="avatar-large"
                style="background: var(--surface-alt); {{ssr:profile_placeholder_display}} align-items: center; justify-content: center; color: var(--muted-badge-text)"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="width: 48px; height: 48px"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
              <input type="file" id="avatar-input" accept="image/*" style="display: none" />
              <button
                type="button"
                id="change-avatar-btn"
                class="secondary-btn"
                style="
                  position: absolute;
                  bottom: -0.5rem;
                  left: 50%;
                  transform: translateX(-50%);
                  padding: 0.25rem 0.5rem;
                  font-size: 0.75rem;
                  white-space: nowrap;
                "
              >
                Change
              </button>
              <button
                type="button"
                id="remove-avatar-btn"
                title="Remove image"
                class="remove-image-btn"
                style="{{ssr:profile_remove_btn_display}}"
              >
                ✕
              </button>
            </div>
            <div>
              <p id="display-email" style="margin: 0.25rem 0 0 0; color: var(--text-faint)">{{ssr:profile_email}}</p>
            </div>
          </div>

          <form id="profile-form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your Name" value="{{ssr:profile_name}}" required />
            </div>
            <div class="form-group">
              <label for="email">Email {{ssr:profile_provider_label}}</label>
              <input
                type="email"
                id="email"
                name="email"
                value="{{ssr:profile_email}}"
                disabled
                title="Email is managed by your login provider"
              />
            </div>
            <button type="submit" id="save-btn" disabled>Save Changes</button>
          </form>
        </section>

        <section>
          <h2>Login Credentials</h2>
          <p style="color: var(--text-faint); font-size: 0.9rem; margin-bottom: 1.5rem">Manage the login methods linked to your account.</p>

          <div id="credentials-list" style="margin-bottom: 2rem">{{ssr:credentials_list_html}}</div>

          <h3>Link another account</h3>
          <div style="display: flex; gap: 1rem; margin-top: 1rem">{{ssr:link_credentials_html}}</div>
        </section>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const API_BASE = '/users/api';
      // Atmosphere (atproto) "union" logo mark, drawn on a 0 0 32 32 viewBox.
      const ATMOSPHERE_MARK_PATH =
        'M16 0C18.1127 1.0372e-05 19.9555 1.15414 20.9332 2.8662C21.1045 3.16613 21.4647 3.31517 21.7979 3.22403C22.2761 3.09321 22.7795 3.02333 23.2992 3.02333C26.4347 3.02335 28.9765 5.56529 28.9765 8.70083C28.9765 9.22048 28.9066 9.72378 28.7758 10.2019C28.6846 10.5351 28.8337 10.8953 29.1336 11.0666C30.8458 12.0442 32 13.8872 32 16C32 16.0822 31.9981 16.1639 31.9946 16.2452C31.9946 16.2456 31.9944 16.246 31.9942 16.2463C31.9939 16.2465 31.9937 16.2469 31.9937 16.2473C31.8599 19.6701 29.2873 22.4 26.1329 22.4L25.9815 22.3979C24.3638 22.353 22.909 21.59 21.8719 20.3888C21.5701 20.0392 20.9949 20.0275 20.6799 20.3652C19.5117 21.6171 17.8474 22.4 16 22.4C12.4654 22.4 9.6 19.5346 9.6 16C9.6 12.4654 12.4654 9.6 16 9.6C17.4368 9.6 18.7629 10.0736 19.831 10.8731C20.0053 11.0036 20.2667 10.8843 20.2667 10.6667C20.2667 10.0776 20.7442 9.6 21.3333 9.6C21.9224 9.6 22.4 10.0776 22.4 10.6667V16C22.4158 18.5458 24.26 20.2666 26.1329 20.2667C27.9447 20.2667 29.7293 18.6564 29.8583 16.2467C29.8583 16.2466 29.8583 16.2464 29.8581 16.2463C29.858 16.2461 29.8579 16.2459 29.8579 16.2458C29.8591 16.2281 29.8597 16.2104 29.8606 16.1927C29.8634 16.1293 29.8654 16.0654 29.8658 16.001C29.8658 16.0006 29.866 16.0003 29.8663 16C29.8665 15.9997 29.8667 15.9994 29.8667 15.999C29.8663 14.5464 28.9914 13.2933 27.7308 12.7465L26.4045 12.1712C26.0876 12.0337 25.937 11.6696 26.0641 11.3484L26.5963 10.0042C26.7549 9.60324 26.8431 9.16479 26.8431 8.70083C26.8431 6.77399 25.3056 5.20644 23.3906 5.15792L23.2992 5.15667C22.8351 5.15667 22.3965 5.24487 21.9956 5.40354L20.6515 5.93568C20.3304 6.06282 19.9663 5.91222 19.8288 5.59538L19.2533 4.26917C18.7234 3.04774 17.5306 2.18836 16.1356 2.13583L16 2.13333C14.547 2.13333 13.2934 3.00824 12.7465 4.26896L12.1712 5.59529C12.0337 5.91217 11.6696 6.06282 11.3484 5.93568L10.0042 5.40354C9.62831 5.25477 9.21941 5.16798 8.7875 5.15771L8.70083 5.15667C6.74349 5.15667 5.15667 6.74349 5.15667 8.70083C5.15667 9.16475 5.24485 9.60323 5.40354 10.0042L5.93568 11.3484C6.06282 11.6696 5.91217 12.0337 5.59529 12.1712L4.26896 12.7465C3.00823 13.2934 2.13333 14.5469 2.13333 16C2.13333 17.4529 3.00832 18.7063 4.26917 19.2533L5.59538 19.8288C5.91222 19.9663 6.06282 20.3304 5.93568 20.6515L5.40354 21.9956C5.24487 22.3965 5.15667 22.835 5.15667 23.2992C5.15667 25.2565 6.74349 26.8433 8.70083 26.8433C9.1644 26.8433 9.60287 26.7551 10.0042 26.5963L11.3484 26.0641C11.6696 25.937 12.0337 26.0876 12.1712 26.4045L12.7465 27.7308C13.2934 28.9917 14.547 29.8667 16 29.8667C17.4529 29.8667 18.7063 28.9918 19.2533 27.7308L19.6555 26.8037C19.8871 26.2698 20.5083 26.0256 21.0415 26.2589C21.561 26.4862 21.8066 27.0847 21.5966 27.6115L21.2104 28.5798C20.3374 30.5922 18.3333 32 16 32C13.8872 32 12.0442 30.8458 11.0666 29.1336C10.8953 28.8337 10.5351 28.6846 10.2019 28.7758C9.72378 28.9067 9.22049 28.9767 8.70083 28.9767C5.56528 28.9767 3.02333 26.4347 3.02333 23.2992C3.02333 22.7795 3.09321 22.2761 3.22403 21.7979C3.31516 21.4647 3.16613 21.1045 2.86619 20.9332C1.15412 19.9555 0 18.1127 0 16C5.927e-07 13.8873 1.1541 12.0443 2.8662 11.0666C3.16613 10.8953 3.31517 10.5351 3.22403 10.2019C3.09323 9.72379 3.02333 9.22047 3.02333 8.70083C3.02333 5.56528 5.56528 3.02333 8.70083 3.02333C9.22047 3.02334 9.72379 3.09323 10.2019 3.22404C10.5351 3.31517 10.8953 3.16614 11.0666 2.86621C12.0443 1.15411 13.8873 0 16 0ZM16 11.7333C13.6436 11.7333 11.7333 13.6436 11.7333 16C11.7333 18.3564 13.6436 20.2667 16 20.2667C18.3564 20.2667 20.2667 18.3564 20.2667 16C20.2667 13.6436 18.3564 11.7333 16 11.7333Z';
      let currentProvider = null;
      let initialProfile = {};
      let isInitialLoad = true;

      async function loadProfile() {
        try {
          // Try to get data from SSR first
          let data = null;
          if (isInitialLoad) {
            const ssrProfileJson = document.body.getAttribute('data-ssr-profile');
            if (ssrProfileJson && !ssrProfileJson.startsWith('{{ssr:')) {
              try {
                data = JSON.parse(ssrProfileJson);
              } catch (e) {
                console.error('Failed to parse SSR profile', e);
              }
            }
          }

          if (!data) {
            const res = await fetch(`${API_BASE}/me`);
            if (!res.ok) {
              if (res.status === 401) {
                window.location.href = '/';
                return;
              }
              throw new Error('Failed to load profile');
            }
            data = await res.json();
          }

          if (data.valid && data.profile) {
            const p = data.profile;
            initialProfile = { name: p.name || '' };
            currentProvider = data.credential ? data.credential.provider : null;
            document.getElementById('name').value = p.name || '';
            document.getElementById('email').value = p.email || '';
            document.getElementById('page-title').textContent = p.name || 'Anonymous';
            document.getElementById('display-email').textContent = p.email || '';

            const userId = p.id;
            document.getElementById('user-id-text').textContent = `ID: ${userId}`;
            document.getElementById('copy-id-btn').onclick = () => {
              navigator.clipboard
                .writeText(userId)
                .then(() => {
                  showToast('User ID copied to clipboard');
                })
                .catch((err) => {
                  console.error('Failed to copy: ', err);
                });
            };

            if (p.picture) {
              const img = document.getElementById('profile-picture');
              img.src = p.picture;
              img.style.display = 'block';
              document.getElementById('profile-avatar-placeholder').style.display = 'none';
              document.getElementById('remove-avatar-btn').style.display = 'flex';
            } else {
              const img = document.getElementById('profile-picture');
              img.src = '';
              img.style.display = 'none';
              document.getElementById('profile-avatar-placeholder').style.display = 'flex';
              document.getElementById('remove-avatar-btn').style.display = 'none';
            }

            const emailLabel = document.querySelector('label[for="email"]');
            if (p.provider) {
              const providerName = p.provider.charAt(0).toUpperCase() + p.provider.slice(1);
              emailLabel.textContent = `Email (from ${providerName})`;
            }

            if (data.account && (data.account.role === 1 || data.is_admin)) {
              document.getElementById('nav-account-item').style.display = 'block';
            }

            loadCredentials(data.credentials);

            document.getElementById('save-btn').disabled = true;
            isInitialLoad = false;
          }
        } catch (e) {
          showToast(e.message);
        }
      }

      document.getElementById('name').addEventListener('input', (e) => {
        const hasChanged = e.target.value !== initialProfile.name;
        document.getElementById('save-btn').disabled = !hasChanged;
      });

      document.getElementById('change-avatar-btn').onclick = () => {
        document.getElementById('avatar-input').click();
      };

      document.getElementById('avatar-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 1024 * 1024) {
          showToast('Image too large (max 1MB)');
          return;
        }

        try {
          const res = await fetch('/users/me/avatar', {
            method: 'PUT',
            headers: {
              'Content-Type': file.type,
            },
            body: await file.arrayBuffer(),
          });

          if (res.ok) {
            showToast('Avatar updated');
            // Refresh image by appending timestamp to bypass cache
            const img = document.getElementById('profile-picture');
            img.src = `/users/me/avatar?t=${Date.now()}`;
            img.style.display = 'block';
            document.getElementById('profile-avatar-placeholder').style.display = 'none';
            document.getElementById('remove-avatar-btn').style.display = 'flex';

            loadProfile();

            // Refresh power-strip
            const powerStrip = document.querySelector('power-strip');
            if (powerStrip && typeof powerStrip.refresh === 'function') {
              powerStrip.refresh();
            }
          } else {
            const err = await res.text();
            throw new Error(err || 'Failed to upload avatar');
          }
        } catch (e) {
          showToast(e.message);
        }
      };

      document.getElementById('remove-avatar-btn').onclick = async () => {
        if (!confirm('Are you sure you want to remove your profile picture?')) return;

        try {
          const res = await fetch('/users/me/avatar', {
            method: 'DELETE',
          });

          if (res.ok) {
            showToast('Avatar removed');
            loadProfile();

            // Refresh power-strip
            const powerStrip = document.querySelector('power-strip');
            if (powerStrip && typeof powerStrip.refresh === 'function') {
              powerStrip.refresh();
            }
          } else {
            const err = await res.text();
            throw new Error(err || 'Failed to remove avatar');
          }
        } catch (e) {
          showToast(e.message);
        }
      };

      document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;

        try {
          const res = await fetch(`${API_BASE}/me/profile`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ name }),
          });

          if (res.ok) {
            showToast('Profile updated successfully');
            loadProfile(); // Refresh page content

            // Refresh power-strip
            const powerStrip = document.querySelector('power-strip');
            if (powerStrip && typeof powerStrip.refresh === 'function') {
              powerStrip.refresh();
            }
          } else {
            throw new Error('Failed to update profile');
          }
        } catch (e) {
          showToast(e.message);
        }
      };

      function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = 1;
        setTimeout(() => (toast.style.opacity = 0), 3000);
      }

      async function loadCredentials(passedCredentials) {
        const list = document.getElementById('credentials-list');
        try {
          // Try to get data from passed credentials or SSR first
          let credentials = passedCredentials;

          if (!credentials && isInitialLoad) {
            const ssrCredentialsJson = document.body.getAttribute('data-ssr-credentials');
            if (ssrCredentialsJson && !ssrCredentialsJson.startsWith('{{ssr:')) {
              try {
                credentials = JSON.parse(ssrCredentialsJson);
              } catch (e) {
                console.error('Failed to parse SSR credentials', e);
              }
            }
          }

          if (!credentials) {
            const res = await fetch(`${API_BASE}/me/credentials`);
            if (!res.ok) throw new Error('Failed to load credentials');
            credentials = await res.json();
          }

          if (credentials.length === 0) {
            list.innerHTML = '<p>No credentials linked.</p>';
            return;
          }

          list.innerHTML = credentials
            .map((c) => {
              const isCurrent = c.provider === currentProvider;
              return `
              <div class="credential-item ${isCurrent ? 'active' : ''}">
                <div class="credential-info">
                  <div class="provider-icon">
                    ${getProviderIcon(c.provider)}
                  </div>
                  <div>
                    <div style="font-weight: 600;">
                      ${providerLabel(c.provider)}
                      ${isCurrent ? '<span class="current-badge">logged in</span>' : ''}
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-faint);">${credentialIdentifier(c)}</div>
                  </div>
                </div>
                <button class="remove-btn" onclick="removeCredential('${c.provider}')" ${isCurrent || credentials.length === 1 ? 'disabled title="' + (isCurrent ? 'Cannot remove the method you are currently logged in with' : 'Cannot remove your last login method') + '"' : ''}>
                  Remove
                </button>
              </div>
            `;
            })
            .join('');
        } catch (e) {
          list.innerHTML = `<p style="color: red;">${e.message}</p>`;
        }
      }

      async function removeCredential(provider) {
        if (!confirm(`Are you sure you want to remove ${provider} as a login method?`)) return;

        try {
          const res = await fetch(`${API_BASE}/me/credentials`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider }),
          });

          if (res.ok) {
            showToast('Credential removed');
            loadCredentials();
          } else {
            const error = await res.text();
            throw new Error(error || 'Failed to remove credential');
          }
        } catch (e) {
          showToast(e.message);
        }
      }

      function getProviderIcon(provider) {
        if (provider === 'google') {
          return `<svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  </svg>`;
        } else if (provider === 'twitch') {
          return `<svg viewBox="0 0 24 24" width="24" height="24" style="color: #9146FF;">
                    <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z" fill="currentColor"/>
                  </svg>`;
        } else if (provider === 'patreon') {
          return `<svg viewBox="0 0 24 24" width="24" height="24" style="color: #FF424D;">
                    <path d="M14.82 2.41c3.96 0 7.18 3.24 7.18 7.21 0 3.96-3.22 7.18-7.18 7.18-3.97 0-7.21-3.22-7.21-7.18 0-3.97 3.24-7.21 7.21-7.21M2 21.6h3.5V2.41H2V21.6z" fill="currentColor"/>
                  </svg>`;
        } else if (provider === 'atproto') {
          return `<svg viewBox="0 0 32 32" width="24" height="24" style="color: #4a8ad4;">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="${ATMOSPHERE_MARK_PATH}" fill="currentColor"/>
                  </svg>`;
        }
        return '';
      }

      // atproto is branded "Atmosphere / ATproto"; the identifier shows the handle with the DID in parens.
      function providerLabel(provider) {
        if (provider === 'atproto') return 'Atmosphere / ATproto';
        return provider.charAt(0).toUpperCase() + provider.slice(1);
      }
      function credentialIdentifier(c) {
        if (c.provider === 'atproto') {
          if (!c.handle) return c.subject_id;
          return `<span style="font-size: 1.05rem; font-weight: 600;">@${c.handle}</span> <span style="opacity: 0.6;">(${c.subject_id})</span>`;
        }
        return c.email || c.subject_id;
      }

      loadProfile();
      // loadCredentials(); // Handled within loadProfile if data exists
    </script>
  </body>
</html>
